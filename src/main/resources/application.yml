spring:
  application:
    name: StomatologyApp
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

logging:
  file:
    name: logs/stomatology.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7

  level:
    root: INFO
    org.hibernate.engine.jdbc.spi.SqlExceptionHelper: error


server:
  servlet:
    session:
      timeout: 15m
