<!DOCTYPE html>
<html xmlns:sec="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:fragment="title">Записи</title>
</head>

<body>

<th:block th:replace="layout :: layout (~{::title}, ~{::header}, ~{::content})">

    <th:block th:fragment="header">
        <h1 sec:authorize="hasRole('ADMIN')">
            Список всех записей
        </h1>

        <h1 sec:authorize="hasRole('DOCTOR')">
            Ваши записи
        </h1>

        <a class="buttonAdd" href="/appointments/new" sec:authorize="hasRole('ADMIN')">
            Новая запись
        </a>
    </th:block>

    <th:block th:fragment="content">

        <!--        table of scheduled appointments-->
        <div class="container">
            <div class="tableCaption">
                <h2>Записи в работе</h2>
            </div>
            <table class="table">
                <thead>
                <tr>
                    <th>Клиент</th>
                    <th>Телефон</th>
                    <th>Врач</th>
                    <th>Дата</th>
                    <th>Был ранее</th>
                    <th>Статус</th>
                    <th sec:authorize="hasRole('ADMIN')">Действия</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="a : ${scheduledAppointments.content}">
                    <td th:text="${a.clientFullName}"></td>
                    <td th:text="${a.clientPhone}"></td>
                    <td th:text="${a.doctorFullName}"></td>
                    <td th:text="${#temporals.format(a.time, 'dd.MM.yyyy HH:mm')}"></td>
                    <td>
                    <span th:class="${a.beenBefore} ? 'badge old' : 'badge new'"
                          th:text="${a.beenBefore} ? 'Да' : 'Нет'">
                    </span>
                    </td>
                    <td th:text="#{${'appointments.status.' + a.status}}"></td>
                    <td sec:authorize="hasRole('ADMIN')">

                        <form method="post" style="display:inline" th:action="@{/appointments/done}">
                            <input name="appointmentId" th:value="${a.id}" type="hidden"/>

                            <button class="buttonDone" th:disabled="${a.status == 'DONE'}"
                                    type="submit">
                                ✓
                            </button>
                        </form>

                    </td>
                    <td>
                        <a class="button" th:href="@{/appointments/{id}(id=${a.id})}">Подробнее</a>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- Pagination for scheduled appointments -->
            <div class="pagination" th:if="${scheduledAppointments.totalPages > 1}">
                <a th:if="${scheduledAppointments.hasPrevious()}"
                   th:href="@{/appointments(scheduledPage=${scheduledAppointments.number - 1}, scheduledSize=${scheduledAppointments.size}, donePage=${doneAppointments.number}, doneSize=${doneAppointments.size})}"
                   class="page-link">Предыдущая</a>
                <span th:each="i : ${#numbers.sequence(0, scheduledAppointments.totalPages - 1)}">
                    <a th:if="${i != scheduledAppointments.number}"
                       th:href="@{/appointments(scheduledPage=${i}, scheduledSize=${scheduledAppointments.size}, donePage=${doneAppointments.number}, doneSize=${doneAppointments.size})}"
                       th:text="${i + 1}" class="page-link"></a>
                    <span th:if="${i == scheduledAppointments.number}" th:text="${i + 1}" class="page-link current"></span>
                </span>
                <a th:if="${scheduledAppointments.hasNext()}"
                   th:href="@{/appointments(scheduledPage=${scheduledAppointments.number + 1}, scheduledSize=${scheduledAppointments.size}, donePage=${doneAppointments.number}, doneSize=${doneAppointments.size})}"
                   class="page-link">Следующая</a>
            </div>

        </div>

        <!--        table of done appointments-->
        <div class="container">
            <div class="tableCaption">
                <h2>Проведенные отмеченные записи</h2>
            </div>
            <table class="table">
                <thead>
                <tr>
                    <th>Клиент</th>
                    <th>Телефон</th>
                    <th>Врач</th>
                    <th>Дата</th>
                    <th>Был ранее</th>
                    <th>Статус</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="a : ${doneAppointments.content}">
                    <td th:text="${a.clientFullName}"></td>
                    <td th:text="${a.clientPhone}"></td>
                    <td th:text="${a.doctorFullName}"></td>
                    <td th:text="${#temporals.format(a.time, 'dd.MM.yyyy HH:mm')}"></td>
                    <td>
                    <span th:class="${a.beenBefore} ? 'badge old' : 'badge new'"
                          th:text="${a.beenBefore} ? 'Да' : 'Нет'">
                    </span>
                    </td>
                    <td th:text="#{${'appointments.status.' + a.status}}"></td>
                    <td>
                        <a class="button" th:href="@{/appointments/{id}(id=${a.id})}">Подробнее</a>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- Pagination for done appointments -->
            <div class="pagination" th:if="${doneAppointments.totalPages > 1}">
                <a th:if="${doneAppointments.hasPrevious()}"
                   th:href="@{/appointments(scheduledPage=${scheduledAppointments.number}, scheduledSize=${scheduledAppointments.size}, donePage=${doneAppointments.number - 1}, doneSize=${doneAppointments.size})}"
                   class="page-link">Предыдущая</a>
                <span th:each="i : ${#numbers.sequence(0, doneAppointments.totalPages - 1)}">
                    <a th:if="${i != doneAppointments.number}"
                       th:href="@{/appointments(scheduledPage=${scheduledAppointments.number}, scheduledSize=${scheduledAppointments.size}, donePage=${i}, doneSize=${doneAppointments.size})}"
                       th:text="${i + 1}" class="page-link"></a>
                    <span th:if="${i == doneAppointments.number}" th:text="${i + 1}" class="page-link current"></span>
                </span>
                <a th:if="${doneAppointments.hasNext()}"
                   th:href="@{/appointments(scheduledPage=${scheduledAppointments.number}, scheduledSize=${scheduledAppointments.size}, donePage=${doneAppointments.number + 1}, doneSize=${doneAppointments.size})}"
                   class="page-link">Следующая</a>
            </div>

        </div>

    </th:block>

</th:block>

</body>
</html>
