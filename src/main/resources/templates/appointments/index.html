<!DOCTYPE html>
<html xmlns:sec="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:fragment="title">Записи</title>
</head>

<body>

<th:block th:replace="layout :: layout (~{::title}, ~{::header}, ~{::content})">

    <th:block th:fragment="header">
        <h1 sec:authorize="hasRole('ADMIN')">
            Список всех записей
        </h1>

        <h1 sec:authorize="hasRole('DOCTOR')">
            Ваши записи
        </h1>

        <a class="buttonAdd" href="/appointments/new" sec:authorize="hasRole('ADMIN')">
            Новая запись
        </a>
    </th:block>

    <th:block th:fragment="content">

        <div class="container">



            <div class="tableCaption">
                <h2>Записи в работе</h2>
            </div>
            <table class="table">
                <thead>
                <tr>
                    <th>Клиент</th>
                    <th>Телефон</th>
                    <th>Врач</th>
                    <th>Дата</th>
                    <th>Был ранее</th>
                    <th>Статус</th>
                    <th sec:authorize="hasRole('ADMIN')">Действия</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="a : ${scheduledAppointments}">
                    <td th:text="${a.clientFullName}"></td>
                    <td th:text="${a.clientPhone}"></td>
                    <td th:text="${a.doctorFullName}"></td>
                    <td th:text="${#temporals.format(a.time, 'dd.MM.yyyy HH:mm')}"></td>
                    <td>
                    <span th:class="${a.beenBefore} ? 'badge old' : 'badge new'"
                          th:text="${a.beenBefore} ? 'Да' : 'Нет'">
                    </span>
                    </td>
                    <td th:text="#{${'appointments.status.' + a.status}}"></td>
                    <td sec:authorize="hasRole('ADMIN')">

                        <form th:action="@{/appointments/done}" method="post" style="display:inline">
                            <input type="hidden" name="appointmentId" th:value="${a.id}" />

                            <button type="submit" class="buttonDone"
                                    th:disabled="${a.status == 'DONE'}">
                                ✓
                            </button>
                        </form>

                    </td>
                    <td>
                        <a class="button" th:href="@{/a/{id}(id=${a.id})}">Подробнее</a>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>

    </th:block>

</th:block>

</body>
</html>
