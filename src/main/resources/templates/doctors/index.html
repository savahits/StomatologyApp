<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="">
<head>
    <title th:fragment="title">Доктора</title>
</head>

<body>

<th:block th:replace="layout :: layout (~{::title}, ~{::header}, ~{::content})">

    <th:block th:fragment="header">Наши доктора</th:block>

    <th:block th:fragment="content">
        <div class="container">
            <div class="sectionTitle">
                Наши доктора

                <a class="buttonAdd" th:href="@{/doctors/new}" sec:authorize="hasRole('ADMIN')">Добавить доктора</a>
            </div>

            <table class="table">
                <thead>
                <tr>
                    <th>Фамилия</th>
                    <th>Имя</th>
                    <th>Отчество</th>
                    <th>Телефон</th>
                    <th>Специализация</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="doctor : ${doctors}">
                    <td th:text="${doctor.surname}"></td>
                    <td th:text="${doctor.name}"></td>
                    <td th:text="${doctor.patronymic}"></td>
                    <td th:text="${doctor.phone}"></td>
                    <td th:text="${doctor.specialization.name}"></td>
                    <td>
                        <a class="button" th:href="@{/doctors/{id}(id=${doctor.id})}">Подробнее</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </th:block>

</th:block>

</body>
</html>
