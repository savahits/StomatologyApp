<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="">
<head>
    <title th:fragment="title">Доктора</title>
</head>

<body>

<th:block th:replace="~{layout :: layout (~{::title}, ~{::header}, ~{::content})}">

    <th:block th:fragment="header"><h1>Наши доктора</h1></th:block>

    <th:block th:fragment="content">
        <div id="errorModal" class="modal" th:classappend="${error} ? 'active'">
            <div class="modal-content">
                <h3>Ошибка</h3>
                <p th:text="${error}"></p>

                <div class="modal-actions">
                    <button class="btn btn-cancel" onclick="function closeErrorModal() {
                        document.getElementById('errorModal').classList.remove('active');
                    }
                    closeErrorModal()">Закрыть</button>
                </div>
            </div>
        </div>
        <div class="container">
            <div class="sectionTitle">
                <a class="buttonAdd" th:href="@{/doctors/new}" sec:authorize="hasRole('ADMIN')">Добавить доктора</a>
                <a class="buttonAdd" th:href="@{/specializations/new}" sec:authorize="hasRole('ADMIN')">
                    Добавить специализацию
                </a>
            </div>

            <table class="table">
                <thead>
                <tr>
                    <th>Фамилия</th>
                    <th>Имя</th>
                    <th>Отчество</th>
                    <th>Телефон</th>
                    <th>Специализация</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="doctor : ${doctors.content}">
                    <td th:text="${doctor.surname}"></td>
                    <td th:text="${doctor.name}"></td>
                    <td th:text="${doctor.patronymic}"></td>
                    <td th:text="${doctor.phone}"></td>
                    <td th:text="${doctor.specialization.name}"></td>
                    <td>
                        <a class="button" th:href="@{/doctors/{id}(id=${doctor.id})}">Подробнее</a>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- Pagination for doctors -->
            <div class="pagination" th:if="${doctors.totalPages > 1}">
                <a th:if="${doctors.hasPrevious()}"
                   th:href="@{/doctors(page=${doctors.number - 1}, size=${doctors.size})}"
                   class="page-link">Предыдущая</a>
                <span th:each="i : ${#numbers.sequence(0, doctors.totalPages - 1)}">
                    <a th:if="${i != doctors.number}"
                       th:href="@{/doctors(page=${i}, size=${doctors.size})}"
                       th:text="${i + 1}" class="page-link"></a>
                    <span th:if="${i == doctors.number}" th:text="${i + 1}" class="page-link current"></span>
                </span>
                <a th:if="${doctors.hasNext()}"
                   th:href="@{/doctors(page=${doctors.number + 1}, size=${doctors.size})}"
                   class="page-link">Следующая</a>
            </div>
        </div>
    </th:block>

</th:block>

</body>
</html>
