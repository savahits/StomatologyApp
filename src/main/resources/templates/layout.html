<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.w3.org/1999/xhtml"
      th:fragment="layout(title, header, content)">

<head>
    <meta charset="UTF-8">
    <title th:replace="${title}">StomatologyApp</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>

<div class="page">

    <!-- HEADER -->
    <header class="header">
        <div class="container headerInner">

            <div class="logo">Savva Clinic</div>

            <!-- NAVIGATION -->
            <nav class="nav">
                <a class="navItem" th:href="@{/doctors}">
                    Врачи
                </a>

                <a class="navItem" th:href="@{/appointments}">
                    Записи
                </a>
            </nav>

            <!-- USER -->
            <div class="userBlock">
                <span>
                    Здравствуйте,
                    <span sec:authentication="principal.helloName"></span>
                </span>

                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="logoutBtn">Выйти</button>
                </form>
            </div>

        </div>
    </header>

    <!-- HERO -->
    <section class="hero">
        <div class="container">
            <h1 th:replace="${header}">Заголовок</h1>
        </div>
    </section>

    <!-- CONTENT -->
    <main class="content">
        <div class="container">
            <div th:replace="${content}"></div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 Savva Clinic</p>
        </div>
    </footer>

</div>

<script src="/js/script.js"></script>

</body>
</html>
